<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Poppins', sans-serif; 
            background-color: #0b1a2e; touch-action: manipulation; 
        }
        
        /* Pantalla de Inicio */
        #start-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #0b1a2e; display: flex; justify-content: center; 
            align-items: center; z-index: 999; transition: opacity 2s ease; 
            cursor: pointer; padding: 20px; 
        }
        #start-btn { 
            background: linear-gradient(45deg, #d35400, #f39c12); color: white; 
            border: none; padding: 25px; font-size: clamp(0.9rem, 4.2vw, 1.1rem); 
            border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            text-align: center; width: 90%; max-width: 400px; line-height: 1.5; 
        }

        /* Paisaje y Elementos Visuales */
        #sky { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; transition: background 15s ease-in-out; background: #0b1a2e; }
        #stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; opacity: 0; transition: opacity 8s ease; }
        #ground { position: absolute; bottom: 0; left: 0; width: 100%; height: 18vh; background: linear-gradient(to top, #0f2b10, #1b4d1d); z-index: 10; }
        #garden { position: absolute; bottom: 10vh; left: 0; width: 100%; height: 65vh; z-index: 15; pointer-events: none; }
        
        /* Flores */
        .flower { position: absolute; bottom: 0; transform-origin: bottom center; animation: growAndFade 28s ease-in-out forwards, sway 5s ease-in-out infinite alternate; }
        @keyframes growAndFade { 0% { transform: scale(0); opacity: 0; } 10% { transform: scale(1); opacity: 1; } 90% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.5); opacity: 0; } }
        @keyframes sway { from { transform: rotate(-1.5deg); } to { transform: rotate(1.5deg); } }
        
        .sparkle { position: absolute; width: 6px; height: 6px; background: #ffeb3b; border-radius: 50%; pointer-events: none; z-index: 60; animation: fly 1s ease-out forwards; }
        @keyframes fly { to { transform: translateY(-60px) scale(0); opacity: 0; } }

        /* --- BLOQUE CENTRAL OPTIMIZADO PARA MÓVIL --- */
        .sequence-item {
            position: absolute;
            top: 45%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            animation: floatingFade 12.5s ease-in-out forwards;
        }

        @keyframes floatingFade {
            0% { opacity: 0; transform: translate(-50%, -48%); }
            15% { opacity: 1; transform: translate(-50%, -50%); }
            85% { opacity: 1; transform: translate(-50%, -50%); }
            100% { opacity: 0; transform: translate(-50%, -52%); }
        }

        .phrase {
            color: white;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.3rem, 6.5vw, 1.9rem);
            text-shadow: 0 4px 12px rgba(0,0,0,1);
            text-align: center;
            margin: 10px 0;
            line-height: 1.2;
            width: 100%;
        }

        .photo-frame {
            width: 180px;         /* Tamaño reducido para mejor ajuste en móvil */
            height: 180px;
            border-radius: 15px;
            border: 4px solid white;
            background-color: rgba(255, 255, 255, 0.05); /* Fondo sutil */
            object-fit: contain;  /* Muestra la foto completa sin recortar */
            margin: 10px 0;
            display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body onclick="createSparkle(event)">

    <audio id="musica">
        <source src="Mi_universo.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen" onclick="startMagic()">
        <div id="start-btn">
            Feliz día, Day ❤️<br>
            <span style="font-size: 0.85em; font-weight: 300; opacity: 0.9;">Eres lo mejor de esta vida, cuenta conmigo siempre</span><br>
            <p style="font-size: 0.6em; margin-top: 20px; opacity: 0.7; letter-spacing: 2px;">(Toca la pantalla)</p>
        </div>
    </div>

    <div id="sky"></div>
    <div id="stars"></div>
    <div id="garden"></div>
    <div id="ground"></div>

    <script>
        const fotos = [
            "1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg", "7.jpg", "8.jpg",
            "9.jpg", "10.jpg", "11.jpg", "12.jpg", "13.jpg", "14.jpg", "15.jpg",
            "16.jpg", "17.jpg" 
        ];

        let phrases = [
            "Eres admirable", "Tu presencia lo cambia todo", "Eres valiosa, señorita", "Admiro tu fortaleza", 
            "Qué suerte es conocerte", "Eres suficiente y más", "Brillas con luz propia", "Eres increíble tal como eres", 
            "Tu sonrisa es un regalo", "Eres alguien muy especial", "Mereces calma y paz", "Qué bien se siente verte feliz", 
            "Eres una mujer excepcional", "Tu determinación es inspiradora", "Eres paz en el caos", "Nunca dudes de ti <3", 
            "Eres absolutamente hermosa", "Te admiro profundamente", "Eres el pensamiento más bonito", "Contigo el tiempo se detiene", 
            "Tu luz es única", "Eres capaz de todo", "Mereces lo mejor y lo mas lindo", "Eres una gran persona", 
            "Admiro tu esencia", "Eres pura magia", "Tu bienestar importa mucho", "Eres auténtica", 
            "Sigue brillando siempre", "Eres valiente", 
            "Me gusta compartir momentos contigo", "Gracias por tu paciencia", "Te esperaré", "Gracias por todo"
        ];

        let fotoIndex = 0;
        let fraseIndex = 0;

        const sunflowerSVG = (size) => `
            <svg viewBox="0 0 100 250" width="${size}" height="${size * 2.5}" preserveAspectRatio="xMidYMid meet">
                <path d="M50,250 Q45,160 50,100" stroke="#2d5a27" stroke-width="6" fill="none"/>
                <g fill="#ffc107">
                    ${Array.from({length:10}, (_,i)=>`<ellipse cx="50" cy="100" rx="7" ry="24" transform="rotate(${i*36} 50 100)" />`).join('')}
                </g>
                <circle cx="50" cy="100" r="16" fill="#4e342e"/>
            </svg>
        `;
        
        const higanbanaSVG = (size) => `
            <svg viewBox="0 0 100 250" width="${size}" height="${size * 2.5}" preserveAspectRatio="xMidYMid meet">
                <path d="M50,250 L50,130" stroke="#1b4d1d" stroke-width="3" fill="none"/>
                <g stroke="#d32f2f" fill="none" stroke-width="2.5">
                    ${Array.from({length:8}, (_,i)=>`<path d="M50,130 Q30,70 ${-10+i*15},120" transform="rotate(${i*45} 50 130)"/>`).join('')}
                </g>
                <circle cx="50" cy="130" r="4" fill="#b71c1c"/>
            </svg>
        `;

        function createSparkle(e) {
            for(let i=0; i<6; i++){
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = e.pageX + (Math.random()*24-12) + 'px';
                s.style.top = e.pageY + (Math.random()*24-12) + 'px';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 1000);
            }
        }

        function changeSky() {
            const sky = document.getElementById('sky');
            const colors = ["#0b1a2e", "#16213e", "#1a1a2e", "#0b1a2e"];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            sky.style.background = randomColor;
            document.getElementById('stars').style.opacity = "1";
        }

        function spawnFlower() {
            const flower = document.createElement('div');
            flower.className = 'flower';
            const isSunflower = Math.random() > 0.45;
            const size = (Math.random() * 35 + 40) * (isSunflower ? 1 : 0.75);
            flower.style.left = (Math.random() * 92 + 4) + '%';
            flower.style.zIndex = Math.floor(size); 
            flower.innerHTML = isSunflower ? sunflowerSVG(size) : higanbanaSVG(size);
            document.getElementById('garden').appendChild(flower);
            setTimeout(() => flower.remove(), 28000);
        }

        function spawnSequence() {
            if (fraseIndex >= phrases.length) {
                setTimeout(() => {
                    if(!document.querySelector('.final-message')) {
                        const final = document.createElement('div');
                        final.className = 'sequence-item final-message';
                        final.style.animation = "none";
                        final.style.opacity = "1";
                        final.style.top = "50%";
                        final.innerHTML = `<div class="phrase" style="color:#f39c12; font-size: 2.3rem; font-weight:bold;">Para Day, I miss you ❤️</div>`;
                        document.body.appendChild(final);
                    }
                }, 8000);
                return;
            }

            const container = document.createElement('div');
            container.className = 'sequence-item';

            const p1 = document.createElement('div');
            p1.className = 'phrase';
            p1.innerText = phrases[fraseIndex++];

            const img = document.createElement('img');
            img.className = 'photo-frame';
            img.src = fotos[fotoIndex % fotos.length];
            fotoIndex++;

            const p2 = document.createElement('div');
            p2.className = 'phrase';
            p2.innerText = phrases[fraseIndex++];

            container.appendChild(p1);
            container.appendChild(img);
            container.appendChild(p2);

            document.body.appendChild(container);
            setTimeout(() => container.remove(), 13000);
        }

        function startMagic() {
            const audio = document.getElementById('musica');
            audio.play();
            document.getElementById('start-screen').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('start-screen').remove();
                
                setInterval(changeSky, 20000);
                setInterval(spawnFlower, 750);
                
                const starsContainer = document.getElementById('stars');
                for (let i = 0; i < 90; i++) {
                    const s = document.createElement('div');
                    s.style.cssText = `position:absolute; width:1.5px; height:1.5px; background:white; left:${Math.random()*100}%; top:${Math.random()*65}%; border-radius:50%; box-shadow:0 0 5px #fff;`;
                    starsContainer.appendChild(s);
                }

                // Ciclo: 17 bloques cada 14.5 segundos = ~4 min 10 seg
                spawnSequence();
                const masterInterval = setInterval(() => {
                    if (fraseIndex < phrases.length) {
                        spawnSequence();
                    } else {
                        clearInterval(masterInterval);
                    }
                }, 14500); 

            }, 2000);
        }
    </script>
</body>
</html>
