<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; font-family: 'Poppins', sans-serif; 
            background-color: #050b16; touch-action: manipulation; 
        }
        
        /* --- INTERFAZ DE INICIO --- */
        #start-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background-color: #050b16; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 999; 
            transition: opacity 1.5s ease; cursor: pointer; padding: 20px; 
        }

        #start-btn { 
            background: linear-gradient(45deg, #d35400, #f39c12); color: white; 
            border: none; padding: 25px; font-size: clamp(0.9rem, 4.2vw, 1.1rem); 
            border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            text-align: center; width: 90%; max-width: 400px; line-height: 1.5;
            margin-bottom: 20px;
        }

        .hint-text { color: white; font-size: 0.75rem; opacity: 0.5; font-weight: 300; text-align: center; max-width: 280px; line-height: 1.4; }
        #loader-text { display: none; color: white; font-family: 'Caveat', cursive; text-align: center; animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* --- CIELO, ESTRELLAS Y PARPADEO --- */
        #sky { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle at center, #1a2a44 0%, #050b16 100%); overflow: hidden; }
        #stars { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; z-index: 2; opacity: 0; transition: opacity 5s ease; }
        
        .star { 
            position: absolute; background: white; border-radius: 50%; 
            box-shadow: 0 0 6px #fff; 
            animation: twinkle var(--d) infinite ease-in-out; 
        }
        @keyframes twinkle { 
            0%, 100% { opacity: 0.3; transform: scale(1); } 
            50% { opacity: 1; transform: scale(1.2); } 
        }
        
        /* --- ESCENARIO Y FLORES --- */
        #ground { position: absolute; bottom: 0; left: 0; width: 100%; height: 22vh; background: linear-gradient(to bottom, transparent 0%, #132d14 20%, #0a1a0b 100%); z-index: 10; }
        #garden { position: absolute; bottom: 8vh; left: 0; width: 100%; height: 75vh; z-index: 15; pointer-events: none; }
        
        .flower { position: absolute; bottom: 0; transform-origin: bottom center; animation: growAndFade 28s ease-in-out forwards; }
        @keyframes growAndFade { 
            0% { transform: scale(0); opacity: 0; } 
            10% { transform: scale(1); opacity: 1; } 
            90% { opacity: 1; } 
            100% { transform: scale(0.5); opacity: 0; } 
        }
        
        /* --- FOTOS Y MARCO APERLADO --- */
        .sequence-item { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; display: flex; flex-direction: column; align-items: center; 
            z-index: 100; pointer-events: none; opacity: 0; 
            animation: floatingFade 12s ease-in-out forwards; 
        }

        @keyframes floatingFade { 
            0% { opacity: 0; transform: translate(-50%, -45%); } 
            15%, 85% { opacity: 1; transform: translate(-50%, -50%); } 
            100% { opacity: 0; transform: translate(-50%, -55%); } 
        }
        
        .phrase { 
            color: white; font-family: 'Caveat', cursive; 
            font-size: clamp(1.5rem, 7vw, 2.2rem); 
            text-shadow: 0 3px 10px rgba(0,0,0,0.9); 
            text-align: center; margin: 15px 0; width: 90%; 
            line-height: 1.2;
        }

        .photo-frame { 
            width: 170px; height: 170px; 
            border-radius: 20px; border: 5px solid white; 
            object-fit: contain; 
            background-color: #050b16; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); 
        }

        /* --- EFECTO DE CLIC (CHISPAS) --- */
        .sparkle { 
            position: absolute; width: 5px; height: 5px; 
            background: #fff59d; border-radius: 50%; 
            pointer-events: none; z-index: 1000; 
            box-shadow: 0 0 12px #ffeb3b;
            animation: explosion 0.8s ease-out forwards; 
        }
        @keyframes explosion { 
            0% { transform: translate(0, 0) scale(1); opacity: 1; } 
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; } 
        }

        .final-message-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 500; pointer-events: none; padding: 20px;
        }
    </style>
</head>
<body onmousedown="createSparkle(event)" ontouchstart="createSparkle(event)">

    <audio id="musica" loop><source src="Mi_universo.mp3" type="audio/mpeg"></audio>

    <div id="start-screen">
        <div id="start-btn" onclick="preLoad()">
            Feliz día, Day<br>
            <span style="font-size: 0.85em; font-weight: 300;">Eres lo mejor de esta vida, cuenta conmigo</span><br>
            <p style="font-size: 0.6em; margin-top: 20px; opacity: 0.7;">(Toca para comenzar)</p>
        </div>
        <div class="hint-text">Vuelve cuando quieras, podria haber frases nuevas. ✨</div>
        <div id="loader-text"><span style="font-size: 2.2rem;">Preparando sorpresa... ✨</span></div>
    </div>

    <div id="sky"><div id="stars"></div></div>
    <div id="garden"></div>
    <div id="ground"></div>

    <script>
        // --- BASE DE DATOS ---
        const CANTIDAD_TOTAL_FOTOS = 39; 
        const TODAS_LAS_FOTOS = Array.from({length: CANTIDAD_TOTAL_FOTOS}, (_, i) => `${i + 1}.jpg`);
        
        const TODAS_LAS_FRASES = [
            "Eres admirable", "Tu presencia lo cambia todo", "Eres valiosa, señorita", "Admiro tu fortaleza", 
            "Qué suerte es conocerte", "Eres suficiente y más", "Brillas con luz propia", "Eres increíble tal como eres", 
            "Tu sonrisa es un regalo", "Eres alguien muy especial", "Mereces calma y paz", "Qué bien se siente verte feliz", 
            "Eres una mujer excepcional", "Tu determinación es inspiradora", "Eres paz en el caos", "Nunca dudes de ti <3", 
            "Eres absolutamente hermosa", "Te admiro profundamente", "Eres el pensamiento más bonito", "Contigo la vida es mejor", 
            "Tu luz es única", "Eres capaz de todo", "Mereces lo mejor y lo más lindo", "Eres una gran persona", 
            "Admiro tu esencia", "Eres pura magia", "Tu bienestar importa mucho", "Eres auténtica", 
            "Sigue brillando siempre", "Eres valiente", "Me gusta compartir momentos contigo", "Gracias por tu paciencia", 
            "Espero tu regreso", "Gracias por todo", "No te vi, pero estás hermosa", "Eres más fuerte de lo que crees", 
            "Tu forma de ser es hermosa", "Haces del mundo un lugar mejor", "Tu corazón vale oro", "Eres una persona maravillosa", 
            "Tu esencia es especial", "Tienes algo muy especial", "Tu presencia da calma", "Tu sonrisa tiene magia", 
            "Eres un regalo para este mundo", "Hay algo muy bonito en ti", "Me alegra que existas", "Haces los días más bonitos", 
            "Eres un pedacito de paz", "Tu mirada transmite paz", "Tu forma de ser es un tesoro", "El mundo es mejor porque existes", 
            "Hay una paz muy bonita en tu forma de ser", "Iluminas incluso los días grises", "La vida es más bonita porque estás tú", 
            "Me gusta escucharte", "Me encanta la energía que tienes", "Me gusta compartir tiempo contigo", 
            "Me parece hermosa tu manera de ser", "Me alegra muchísimo haberte conocido", "Me gusta hablar contigo", 
            "Me gusta que seas tú misma", "Eres y significas mucho <3", "Eres linda", "Eres preciosa", "Eres hermosa", "Eres bella",
            "No importa el mundo, solo importa que estés tú", "Tu existencia me da fuerzas", 
            "Eres el tesoro más grande que he encontrado", "Gracias por existir", 
            "Eres el glitch más hermoso en mi simulación", "Contigo, todo es mejor"
        ];

        let fotosSeleccionadas = [], frasesSeleccionadas = [], fotoIndex = 0, fraseIndex = 0, masterInterval;

        // --- FUNCIONES DE MEZCLA ---
        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // --- GENERADORES DE FLORES (SVG) ---
        const sunflowerSVG = (s) => `<svg viewBox="0 0 100 250" width="${s}" height="${s*2.5}"><path d="M50,250 Q40,160 50,100" stroke="#1b4d1d" stroke-width="5" fill="none"/><g transform="translate(50,100)">${Array.from({length:12}, (_,i)=>`<ellipse cx="0" cy="-25" rx="8" ry="28" fill="#fbc02d" transform="rotate(${i*30})"/>`).join('')}<circle cx="0" cy="0" r="15" fill="#3e2723"/></g></svg>`;
        const higanbanaSVG = (s) => `<svg viewBox="0 0 100 250" width="${s}" height="${s*2.5}"><path d="M50,250 L50,130" stroke="#132d14" stroke-width="2" fill="none"/><g transform="translate(50,130)">${Array.from({length:8}, (_,i)=>`<path d="M0,0 Q-20,-40 -40,-10" stroke="#d32f2f" stroke-width="1.5" fill="none" transform="rotate(${i*45})"/>`).join('')}<circle cx="0" cy="0" r="4" fill="#880e4f"/></g></svg>`;

        // --- FUNCIÓN DE CHISPAS AL TOCAR ---
        function createSparkle(e) {
            const x = (e.clientX || (e.touches && e.touches[0].clientX));
            const y = (e.clientY || (e.touches && e.touches[0].clientY));
            if(!x) return;
            for(let i=0; i<8; i++){
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = x + 'px'; s.style.top = y + 'px';
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 100 + 50;
                s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }
        }

        // --- LÓGICA DEL JARDÍN ---
        function spawnFlower() {
            const f = document.createElement('div'); f.className = 'flower';
            f.style.left = (Math.random() * 90) + '%';
            const s = Math.random() * 30 + 40;
            f.innerHTML = Math.random() > 0.5 ? sunflowerSVG(s) : higanbanaSVG(s);
            document.getElementById('garden').appendChild(f);
            setTimeout(() => f.remove(), 28000);
        }

        // --- LÓGICA DE LA SECUENCIA ---
        function spawnSequence() {
            if (fotoIndex >= fotosSeleccionadas.length) {
                clearInterval(masterInterval);
                setTimeout(() => {
                    const final = document.createElement('div');
                    final.className = 'final-message-container';
                    final.innerHTML = `<div class="phrase" style="color:#f39c12; font-size: clamp(2rem, 9vw, 3rem); font-weight:bold; animation: pulse 3s infinite ease-in-out; opacity:1;">Para Day, I miss you ❤️</div>`;
                    document.body.appendChild(final);
                    setTimeout(() => location.reload(), 9000);
                }, 4000); 
                return;
            }
            const c = document.createElement('div'); c.className = 'sequence-item';
            c.innerHTML = `<div class="phrase">${frasesSeleccionadas[fraseIndex++]}</div><img src="${fotosSeleccionadas[fotoIndex++]}" class="photo-frame"><div class="phrase">${frasesSeleccionadas[fraseIndex++]}</div>`;
            document.body.appendChild(c); 
            setTimeout(() => c.remove(), 12500);
        }

        // --- INICIO Y CARGA ---
        function preLoad() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('loader-text').style.display = 'block';
            fotosSeleccionadas = shuffle([...TODAS_LAS_FOTOS]).slice(0, 17);
            frasesSeleccionadas = shuffle([...TODAS_LAS_FRASES]).slice(0, 34);
            setTimeout(startMagic, 3000);
        }

        function startMagic() {
            document.getElementById('musica').play().catch(()=>{});
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').remove();
                setInterval(spawnFlower, 800);
                const sl = document.getElementById('stars'); sl.style.opacity = "1";
                for (let i = 0; i < 120; i++) { 
                    const s = document.createElement('div'); s.className = 'star';
                    s.style.cssText = `width:2px; height:2px; left:${Math.random()*100}%; top:${Math.random()*100}%; --d:${Math.random()*3+2}s;`;
                    sl.appendChild(s);
                }
                setInterval(() => { sl.style.transform = `rotate(${Date.now() * 0.00002}rad) scale(1.1)`; }, 50);
                spawnSequence(); 
                masterInterval = setInterval(spawnSequence, 13800); 
            }, 1500);
        }
    </script>
</body>
</html>
