<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #0b1a2e; touch-action: manipulation; }
        
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #0b1a2e; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 2s ease; cursor: pointer; padding: 20px; }
        #start-btn { background: linear-gradient(45deg, #d35400, #f39c12); color: white; border: none; padding: 30px; font-size: clamp(0.9rem, 4.5vw, 1.2rem); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); text-align: center; width: 90%; max-width: 450px; line-height: 1.6; }

        #sky { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; transition: background 15s ease-in-out; background: #0b1a2e; }
        #stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; opacity: 0; transition: opacity 8s ease; }
        #ground { position: absolute; bottom: 0; left: 0; width: 100%; height: 18vh; background: linear-gradient(to top, #0f2b10, #1b4d1d); z-index: 10; }
        #garden { position: absolute; bottom: 10vh; left: 0; width: 100%; height: 65vh; z-index: 15; pointer-events: none; }
        
        #photo-container { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); z-index: 50; display: none; }
        .photo-frame { width: 180px; height: 180px; border-radius: 15px; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); object-fit: cover; opacity: 0; transition: opacity 1.5s ease; animation: kenburns 10s linear infinite; }
        @keyframes kenburns { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        .flower { position: absolute; bottom: 0; transform-origin: bottom center; animation: growAndFade 28s ease-in-out forwards, sway 5s ease-in-out infinite alternate; }
        @keyframes growAndFade { 0% { transform: scale(0); opacity: 0; } 10% { transform: scale(1); opacity: 1; } 90% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.5); opacity: 0; } }
        @keyframes sway { from { transform: rotate(-1.5deg); } to { transform: rotate(1.5deg); } }
        
        .sparkle { position: absolute; width: 6px; height: 6px; background: #ffeb3b; border-radius: 50%; pointer-events: none; z-index: 60; animation: fly 1s ease-out forwards; }
        @keyframes fly { to { transform: translateY(-60px) scale(0); opacity: 0; } }

        .phrase-container { position: absolute; bottom: 20vh; left: 50%; transform: translateX(-50%); width: 85%; max-width: 380px; z-index: 25; pointer-events: none; }
        .phrase { color: white; font-family: 'Dancing Script', cursive; font-size: clamp(1.5rem, 7vw, 2.2rem); text-shadow: 2px 2px 10px rgba(0,0,0,1); text-align: center; line-height: 1.2; opacity: 0; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { transform: translateY(-70vh); opacity: 0; } }
    </style>
</head>
<body onclick="createSparkle(event)">

    <audio id="musica"><source src="Mi_universo.mp3" type="audio/mpeg"></audio>

    <div id="start-screen" onclick="startMagic()">
        <div id="start-btn" id="start-content">
            Feliz día, Day ❤️<br>
            <span style="font-size: 0.8em; font-weight: 300; opacity: 0.9;">Recuerda que eres lo mejor de esta vida, cuenta conmigo</span><br>
            <p style="font-size: 0.6em; margin-top: 20px; opacity: 0.7; letter-spacing: 2px;">(Toca la pantalla)</p>
        </div>
    </div>

    <div id="photo-container"><img id="photo-display" class="photo-frame"></div>
    <div id="sky"></div>
    <div id="stars"></div>
    <div id="garden"></div>
    <div id="ground"></div>

    <script>
        const fotos = ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg", "7.jpg", "8.jpg", "9.jpg", "10.jpg", "11.jpg", "12.jpg", "13.jpg", "14.jpg", "15.jpg", "16.jpg", "17.jpg"];
        const frases = [
            "Eres admirable", "Tu presencia lo cambia todo", "Eres valiosa, señorita", "Admiro tu fortaleza", 
            "Qué suerte es conocerte", "Eres suficiente y más", "Brillas con luz propia", "Eres increíble tal como eres", 
            "Tu sonrisa es un regalo", "Eres alguien muy especial", "Mereces calma y paz", "Qué bien se siente verte feliz", 
            "Eres una mujer excepcional", "Tu determinación es inspiradora", "Eres paz en el caos", "Nunca dudes de ti <3", 
            "Eres absolutamente hermosa", "Te admiro profundamente", "Eres el pensamiento más bonito", "Contigo el tiempo se detiene", 
            "Tu luz es única", "Eres capaz de todo", "Mereces lo mejor y lo mas lindo", "Eres una gran persona", 
            "Admiro tu esencia", "Eres pura magia", "Tu bienestar importa mucho", "Eres auténtica", 
            "Sigue brillando siempre", "Eres valiente", "Me gusta compartir momentos contigo", "Gracias por tu paciencia", "Te esperaré", "Gracias por todo"
        ];

        let index = 0;
        let interval;

        function startMagic() {
            const audio = document.getElementById('musica');
            audio.currentTime = 0;
            audio.play();
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('start-screen').style.display = 'none', 2000);
            
            setInterval(changeSky, 25000);
            setInterval(spawnFlower, 600);
            
            interval = setInterval(() => {
                if (index < 17) {
                    mostrarPareja(index);
                    index++;
                } else {
                    clearInterval(interval);
                }
            }, 12000);
        }

        function mostrarPareja(i) {
            // Foto
            const cont = document.getElementById('photo-container');
            const img = document.getElementById('photo-display');
            img.src = fotos[i];
            cont.style.display = 'block';
            img.style.opacity = '1';
            
            // Frases (Arriba y Abajo)
            const c1 = document.createElement('div'); c1.className = 'phrase-container'; c1.style.bottom = '60vh';
            c1.innerHTML = `<div class="phrase" style="animation: floatUp 10s linear forwards;">${frases[i*2]}</div>`;
            const c2 = document.createElement('div'); c2.className = 'phrase-container'; c2.style.bottom = '20vh';
            c2.innerHTML = `<div class="phrase" style="animation: floatUp 10s linear forwards;">${frases[i*2+1]}</div>`;
            document.body.appendChild(c1); document.body.appendChild(c2);

            setTimeout(() => { img.style.opacity = '0'; c1.remove(); c2.remove(); }, 10000);
        }

        document.getElementById('musica').onended = () => {
            setTimeout(() => {
                const s = document.getElementById('start-screen');
                s.style.display = 'flex';
                s.style.opacity = '1';
                document.getElementById('start-content').innerHTML = "¡Gracias por ver!<br>Ver de nuevo ❤️";
            }, 5000);
        };
        
        // Mantener funciones originales de flores y estrellas
        function createSparkle(e) { /* ... tu función original ... */ }
        function changeSky() { /* ... tu función original ... */ }
        function spawnFlower() { /* ... tu función original ... */ }
    </script>
</body>
</html>
