<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #0b1a2e; touch-action: manipulation; }
        
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #0b1a2e; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 1s ease; cursor: pointer; padding: 20px; }
        #start-btn { background: linear-gradient(45deg, #2980b9, #3498db); color: white; border: none; padding: 30px; font-size: 1.2rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); text-align: center; width: 90%; max-width: 450px; }

        #sky { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #0b1a2e; }
        #photo-container { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); z-index: 50; display: none; }
        .photo-frame { width: 220px; height: 220px; border-radius: 15px; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); object-fit: cover; opacity: 0; transition: opacity 1s ease; }
        
        .phrase-container { position: absolute; bottom: 25vh; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; text-align: center; z-index: 25; }
        .phrase { color: white; font-family: 'Dancing Script', cursive; font-size: 1.8rem; text-shadow: 2px 2px 10px rgba(0,0,0,1); opacity: 0; transition: opacity 1s ease; margin-bottom: 10px; }
    </style>
</head>
<body>

    <audio id="musica">
        <source src="Mi_universo.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen" onclick="startMagic()">
        <div id="start-btn" id="btn-text">¡Hola, Day! ❤️<br><span style="font-size: 0.8em;">(Toca para ver el detalle)</span></div>
    </div>

    <div id="photo-container"><img id="photo-display" class="photo-frame"></div>
    <div id="sky"></div>
    <div id="phrase-display" class="phrase-container">
        <div id="p-text1" class="phrase"></div>
        <div id="p-text2" class="phrase"></div>
    </div>

    <script>
        const fotos = ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg", "7.jpg", "8.jpg", "9.jpg", "10.jpg", "11.jpg", "12.jpg", "13.jpg", "14.jpg", "15.jpg", "16.jpg", "17.jpg"];
        
        let frases = [
            "Eres admirable", "Tu presencia lo cambia todo", "Eres valiosa, señorita", "Admiro tu fortaleza", 
            "Qué suerte es conocerte", "Eres suficiente y más", "Brillas con luz propia", "Eres increíble tal como eres", 
            "Tu sonrisa es un regalo", "Eres alguien muy especial", "Mereces calma y paz", "Qué bien se siente verte feliz", 
            "Eres una mujer excepcional", "Tu determinación es inspiradora", "Eres paz en el caos", "Nunca dudes de ti <3", 
            "Eres absolutamente hermosa", "Te admiro profundamente", "Eres el pensamiento más bonito", "Contigo el tiempo se detiene", 
            "Tu luz es única", "Eres capaz de todo", "Mereces lo mejor y lo mas lindo", "Eres una gran persona", 
            "Admiro tu esencia", "Eres pura magia", "Tu bienestar importa mucho", "Eres auténtica", 
            "Sigue brillando siempre", "Eres valiente", 
            // 4 frases de amistad añadidas:
            "Me gusta compartir momentos contigo", "Gracias por tu paciencia", "Te esperaré", "Gracias por todo"
        ];

        let index = 0;
        let interval;

        function startMagic() {
            const audio = document.getElementById('musica');
            audio.currentTime = 0;
            audio.play();
            
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('start-screen').style.display = 'none', 1000);

            index = 0;
            interval = setInterval(() => {
                if (index < 17) {
                    mostrarPareja(index);
                    index++;
                } else {
                    clearInterval(interval);
                }
            }, 7200); 
        }

        function mostrarPareja(i) {
            const img = document.getElementById('photo-display');
            const contImg = document.getElementById('photo-container');
            const txt1 = document.getElementById('p-text1');
            const txt2 = document.getElementById('p-text2');

            img.src = fotos[i];
            contImg.style.display = 'block';
            img.style.opacity = '1';

            txt1.innerText = frases[i * 2];
            txt2.innerText = frases[i * 2 + 1];
            txt1.style.opacity = '1';
            txt2.style.opacity = '1';

            setTimeout(() => {
                img.style.opacity = '0';
                txt1.style.opacity = '0';
                txt2.style.opacity = '0';
            }, 6000);
        }

        document.getElementById('musica').onended = () => {
            clearInterval(interval);
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'flex';
                document.getElementById('start-screen').style.opacity = '1';
                document.getElementById('start-btn').innerHTML = "¡Gracias por ver! <br> Ver de nuevo ❤️";
            }, 5000);
        };
    </script>
</body>
</html>
