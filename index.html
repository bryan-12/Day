<style>
    /* ... (Tus estilos de sky, stars, ground y garden se mantienen igual) ... */

    /* Contenedor del bloque: Frase - Foto - Frase */
    .sequence-item {
        position: absolute;
        bottom: -20vh; /* Empieza fuera por debajo */
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 50;
        pointer-events: none;
        opacity: 0;
        /* La animación dura 14 segundos para que suba lento y elegante */
        animation: floatUpAndFade 14s linear forwards;
    }

    @keyframes floatUpAndFade {
        0% { transform: translate(-50%, 0); opacity: 0; }
        10% { opacity: 1; }
        85% { opacity: 1; }
        100% { transform: translate(-50%, -100vh); opacity: 0; }
    }

    .phrase {
        color: white;
        font-family: 'Dancing Script', cursive;
        font-size: clamp(1.4rem, 6vw, 2rem);
        text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        text-align: center;
        margin: 5px 0;
    }

    .photo-frame {
        width: 190px;
        height: 190px;
        border-radius: 12px;
        border: 4px solid white;
        box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        object-fit: cover;
        margin: 10px 0;
    }
</style>

<script>
    // Tus 17 fotos
    const fotos = ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg", "7.jpg", "8.jpg", "9.jpg", "10.jpg", "11.jpg", "12.jpg", "13.jpg", "14.jpg", "15.jpg", "16.jpg", "17.jpg"];
    
    // Tus 34 frases exactas
    let phrases = [
        "Eres admirable", "Tu presencia lo cambia todo", "Eres valiosa, señorita", "Admiro tu fortaleza", 
        "Qué suerte es conocerte", "Eres suficiente y más", "Brillas con luz propia", "Eres increíble tal como eres", 
        "Tu sonrisa es un regalo", "Eres alguien muy especial", "Mereces calma y paz", "Qué bien se siente verte feliz", 
        "Eres una mujer excepcional", "Tu determinación es inspiradora", "Eres paz en el caos", "Nunca dudes de ti <3", 
        "Eres absolutamente hermosa", "Te admiro profundamente", "Eres el pensamiento más bonito", "Contigo el tiempo se detiene", 
        "Tu luz es única", "Eres capaz de todo", "Mereces lo mejor y lo mas lindo", "Eres una gran persona", 
        "Admiro tu esencia", "Eres pura magia", "Tu bienestar importa mucho", "Eres auténtica", 
        "Sigue brillando siempre", "Eres valiente", 
        "Me gusta compartir momentos contigo", "Gracias por tu paciencia", "Te esperaré", "Gracias por todo"
    ]; // Quitamos el random para que tú controles el orden si quieres, o déjalo si prefieres azar.

    let fotoIndex = 0;

    function spawnSequence() {
        if (phrases.length < 2) {
            // Mensaje Final al terminar las frases
            setTimeout(() => {
                const final = document.createElement('div');
                final.className = 'sequence-item';
                final.style.bottom = '40vh';
                final.style.animation = "none";
                final.style.opacity = "1";
                final.innerHTML = `<div class="phrase" style="color:#f39c12; font-size: 2.5rem; font-weight:bold;">Para Day, I miss you ❤️</div>`;
                document.body.appendChild(final);
            }, 5000);
            return;
        }

        const container = document.createElement('div');
        container.className = 'sequence-item';

        // 1. Frase arriba
        const p1 = document.createElement('div');
        p1.className = 'phrase';
        p1.innerText = phrases.shift(); // Toma la primera del arreglo

        // 2. Foto al centro
        const img = document.createElement('img');
        img.className = 'photo-frame';
        img.src = fotos[fotoIndex % fotos.length];
        fotoIndex++;

        // 3. Frase abajo
        const p2 = document.createElement('div');
        p2.className = 'phrase';
        p2.innerText = phrases.shift(); // Toma la siguiente

        container.appendChild(p1);
        container.appendChild(img);
        container.appendChild(p2);

        document.body.appendChild(container);

        // Borrar del código después de que suba para no saturar
        setTimeout(() => container.remove(), 15000);
    }

    function startMagic() {
        const audio = document.getElementById('musica');
        audio.play();
        document.getElementById('start-screen').style.opacity = '0';
        
        setTimeout(() => {
            document.getElementById('start-screen').remove();
            
            // Efectos visuales de fondo
            setInterval(changeSky, 20000);
            setInterval(spawnFlower, 700);
            
            // Crear estrellas
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 80; i++) {
                const s = document.createElement('div');
                s.style.cssText = `position:absolute; width:1.5px; height:1.5px; background:white; left:${Math.random()*100}%; top:${Math.random()*65}%; border-radius:50%; box-shadow:0 0 4px #fff;`;
                starsContainer.appendChild(s);
            }

            // LANZAR SECUENCIAS
            spawnSequence(); // La primera sale de inmediato
            
            // Cada 14.5 segundos sale un grupo nuevo (Frase-Foto-Frase)
            // 17 grupos * 14.5 seg = 246.5 segundos (Casi los 4:10 min exactos)
            const masterInterval = setInterval(() => {
                if (phrases.length > 0) {
                    spawnSequence();
                } else {
                    clearInterval(masterInterval);
                }
            }, 14500); 

        }, 2000);
    }
</script>
