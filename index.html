<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #0b1a2e; touch-action: manipulation; }
        
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #0b1a2e; display: flex; justify-content: center; align-items: center; z-index: 999; transition: opacity 2s ease; cursor: pointer; padding: 20px; }
        #start-btn { background: linear-gradient(45deg, #d35400, #f39c12); color: white; border: none; padding: 30px; font-size: 1.2rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); text-align: center; width: 90%; max-width: 450px; }

        #sky { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; transition: background 15s ease-in-out; background: #0b1a2e; }
        #stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; opacity: 1; }
        #ground { position: absolute; bottom: 0; left: 0; width: 100%; height: 18vh; background: linear-gradient(to top, #0f2b10, #1b4d1d); z-index: 10; }
        #garden { position: absolute; bottom: 10vh; left: 0; width: 100%; height: 65vh; z-index: 15; pointer-events: none; }
        
        #photo-container { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); z-index: 50; display: none; }
        .photo-frame { width: 180px; height: 180px; border-radius: 15px; border: 4px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); object-fit: cover; opacity: 0; transition: opacity 1.5s ease; }

        .phrase-container { position: absolute; width: 100%; text-align: center; z-index: 25; pointer-events: none; transition: opacity 1s; }
        .phrase { color: white; font-family: 'Dancing Script', cursive; font-size: 2rem; text-shadow: 2px 2px 10px rgba(0,0,0,1); }
        .flower { position: absolute; bottom: 0; transform-origin: bottom center; animation: grow 20s ease-in-out forwards; }
        @keyframes grow { 0% { transform: scale(0); } 10% { transform: scale(1); } 100% { transform: scale(0.8); } }
    </style>
</head>
<body>

    <audio id="musica"><source src="Mi_universo.mp3" type="audio/mpeg"></audio>

    <div id="start-screen" onclick="startMagic()">
        <div id="start-btn" id="btn-text">¡Hola, Day! ❤️<br>(Toca para comenzar)</div>
    </div>

    <div id="photo-container"><img id="photo-display" class="photo-frame"></div>
    <div id="sky"></div>
    <div id="stars"></div>
    <div id="garden"></div>
    <div id="ground"></div>

    <div id="phrase-top" class="phrase-container" style="top: 45%;"></div>
    <div id="phrase-bottom" class="phrase-container" style="bottom: 10%;"></div>

    <script>
        const fotos = ["1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg", "7.jpg", "8.jpg", "9.jpg", "10.jpg", "11.jpg", "12.jpg", "13.jpg", "14.jpg", "15.jpg", "16.jpg", "17.jpg"];
        const frases = [
            "Eres admirable", "Tu presencia lo cambia todo", "Eres valiosa, señorita", "Admiro tu fortaleza", 
            "Qué suerte es conocerte", "Eres suficiente y más", "Brillas con luz propia", "Eres increíble tal como eres", 
            "Tu sonrisa es un regalo", "Eres alguien muy especial", "Mereces calma y paz", "Qué bien se siente verte feliz", 
            "Eres una mujer excepcional", "Tu determinación es inspiradora", "Eres paz en el caos", "Nunca dudes de ti <3", 
            "Eres absolutamente hermosa", "Te admiro profundamente", "Eres el pensamiento más bonito", "Contigo el tiempo se detiene", 
            "Tu luz es única", "Eres capaz de todo", "Mereces lo mejor y lo mas lindo", "Eres una gran persona", 
            "Admiro tu esencia", "Eres pura magia", "Tu bienestar importa mucho", "Eres auténtica", 
            "Sigue brillando siempre", "Eres valiente", "Me gusta compartir momentos contigo", "Gracias por tu paciencia", "Te esperaré", "Gracias por todo"
        ];

        let index = 0;
        let interval;

        function startMagic() {
            const audio = document.getElementById('musica');
            audio.currentTime = 0;
            audio.play();
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('start-screen').style.display = 'none', 1000);

            interval = setInterval(() => {
                if (index < 17) {
                    mostrarPareja(index);
                    index++;
                } else {
                    clearInterval(interval);
                }
            }, 12000); // 12 segundos por pareja
        }

        function mostrarPareja(i) {
            document.getElementById('photo-container').style.display = 'block';
            document.getElementById('photo-display').src = fotos[i];
            document.getElementById('photo-display').style.opacity = '1';

            document.getElementById('phrase-top').innerHTML = `<div class="phrase">${frases[i * 2]}</div>`;
            document.getElementById('phrase-bottom').innerHTML = `<div class="phrase">${frases[i * 2 + 1]}</div>`;
            
            setTimeout(() => {
                document.getElementById('photo-display').style.opacity = '0';
                document.getElementById('phrase-top').style.opacity = '0';
                document.getElementById('phrase-bottom').style.opacity = '0';
            }, 10000);
        }

        document.getElementById('musica').onended = () => {
            clearInterval(interval);
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'flex';
                document.getElementById('start-screen').style.opacity = '1';
                document.getElementById('start-btn').innerHTML = "¡Gracias por ver! <br> Ver de nuevo ❤️";
            }, 5000);
        };
    </script>
</body>
</html>
